version: '3.8'

# Dev-конфигурация с уникальными портами (без конфликтов)
# Порты: web=3020, api=4020, pg=5450, redis=6390, es=9210, minio=9020/9021

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=klassmarket
      - POSTGRES_USER=klassmarket
      - POSTGRES_PASSWORD=${DB_PASSWORD:-klassmarket_dev_2026}
    volumes:
      - km-postgres-data:/var/lib/postgresql/data
    ports:
      - '5450:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U klassmarket']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - klassmarket-dev

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - km-redis-data:/data
    ports:
      - '6390:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - klassmarket-dev

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms256m -Xmx256m'
    volumes:
      - km-elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - '9210:9200'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - klassmarket-dev

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-klassmarket}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-klassmarket_dev_2026}
    volumes:
      - km-minio-data:/data
    ports:
      - '9020:9000'
      - '9021:9001'
    restart: unless-stopped
    networks:
      - klassmarket-dev

volumes:
  km-postgres-data:
  km-redis-data:
  km-elasticsearch-data:
  km-minio-data:

networks:
  klassmarket-dev:
    driver: bridge
